function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T12:00:00");
  return dt.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}

function toDateStr(y, m, day) {
  return `${y}-${String(m+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

// Built entirely from the numeric Date(y, m, day) constructor -- never
// string-parsed -- so unlike the "date + T12:00:00" idiom used elsewhere
// in this file (which exists specifically to dodge timezone ambiguity
// when parsing a stored "YYYY-MM-DD" string), there's no ambiguity here
// to dodge in the first place. Don't "fix" this by adding T12:00:00.
function buildCalendarCells(monthDate) {
  const y = monthDate.getFullYear();
  const m = monthDate.getMonth();
  const firstWeekday = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const totalCells = Math.ceil((firstWeekday + daysInMonth) / 7) * 7;
  return Array.from({ length: totalCells }, (_, i) => {
    const dayNum = i - firstWeekday + 1;
    if (dayNum < 1 || dayNum > daysInMonth) return null;
    return toDateStr(y, m, dayNum);
  });
}

function colorFor(id) {
  if (!id) return PALETTE[0];
  let hash = 0;
  for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(hash) % PALETTE.length];
}

}

// One-way autofill only: picking a saved property just copies its address
// text into the free-text "Job Site Address" input below. There is no FK
// from jobs to properties -- jobs.address stays denormalized at booking
// time, exactly like jobs.cleaner, so later edits/deletes of a property
// never retroactively touch already-booked jobs.
function SavedPropertyPicker({ properties, form, setForm }) {
  if (!form.client_id || form.client_id === NEW_CLIENT_VALUE) return null;
  const matches = properties.filter(p => p.client_id === form.client_id);
  if (matches.length === 0) return null;
  return (
    <div className="form-group">
      <label className="form-label">Saved Property</label>
      <select className="form-select" value=""
        onChange={e => {
          const p = matches.find(m => m.id === e.target.value);
          if (p) setForm(prev => ({ ...prev, address: p.address }));
        }}>
        <option value="">Choose a saved address to autofill…</option>
        {matches.map(p => (
          <option key={p.id} value={p.id}>{p.label ? `${p.label} — ${p.address}` : p.address}</option>
        ))}
      </select>
    </div>
  );
}

function PassphraseGate({ onUnlock }) {
  const [value, setValue] = useState("");
  const [error, setError] = useState("");

  function submit(e) {
    e.preventDefault();
    if (value === APP_PASSPHRASE) {
      onUnlock();
    } else {
      setError("Incorrect passphrase");
    }
  }

  return (
    <>
      <style>{styles}</style>
      <div className="gate-screen">
        <form className="gate-card" onSubmit={submit}>
          <div className="gate-icon">🧹</div>
          <div className="gate-title">Janna's Cleaning Service</div>
          <div className="gate-sub">Enter the team passphrase to unlock this device</div>
          <input className="form-input" type="password" value={value}
            onChange={e=>{ setValue(e.target.value); setError(""); }}
            placeholder="Passphrase" autoFocus />
          {error && <div className="gate-error">{error}</div>}
          <div style={{marginTop:16}}>
            <button className="btn btn-primary" type="submit" style={{width:"100%"}}>Unlock</button>
          </div>
        </form>
      </div>
    </>
  );
}

function UserPicker({ cleaners, loading, onSelect, onAddNew }) {
  const [showAdd, setShowAdd] = useState(false);
  const [name, setName] = useState("");
  const [busy, setBusy] = useState(false);
  const active = cleaners.filter(c => c.active);

  async function submitAdd(e) {
    e.preventDefault();
    if (!name.trim()) return;
    setBusy(true);
    try {
      await onAddNew(name.trim());
    } finally {
      setBusy(false);
    }
  }

  return (
    <>
      <style>{styles}</style>
      <div className="gate-screen">
        <div className="gate-card" style={{maxWidth:420}}>
          <div className="gate-icon">👋</div>
          <div className="gate-title">Who's this?</div>
          <div className="gate-sub">Pick your name to continue</div>
          {loading
            ? <div className="empty-text">Loading team…</div>
            : active.length > 0 && (
                <div className="name-grid">
                  {active.map(c => (
                    <button key={c.id} className="name-btn" onClick={()=>onSelect(c)}>
                      <div className="name-avatar" style={{background:colorFor(c.id)}}>{c.name[0]}</div>
                      <div className="name-label">{c.name}</div>
                    </button>
                  ))}
                </div>
              )
          }
          {!loading && !showAdd && (
            <button className="btn btn-ghost" style={{marginTop:16,width:"100%"}} onClick={()=>setShowAdd(true)}>
              + Add yourself
            </button>
          )}
          {!loading && showAdd && (
            <form onSubmit={submitAdd} style={{marginTop:16,textAlign:"left"}}>
              <div className="form-group">
                <label className="form-label">Your Name</label>
                <input className="form-input" value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" autoFocus />
              </div>
              <button className="btn btn-primary" type="submit" style={{width:"100%"}} disabled={busy}>
                {busy ? "Adding…" : "Add & Continue"}
              </button>
            </form>
          )}
        </div>
      </div>
    </>
  );
}

function JannasDashboard() {

  const [noteForm, setNoteForm] = useState(EMPTY_NOTE_FORM);
  const [cleanerForm, setCleanerForm] = useState(EMPTY_CLEANER_FORM);

  const [trusted, setTrusted] = useState(() => localStorage.getItem(TRUST_KEY) === 'true');
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; }
  });
  const [showUserMenu, setShowUserMenu] = useState(false);

  useEffect(() => {
    if (notif) { const t = setTimeout(() => setNotif(null), 3000); return () => clearTimeout(t); }

  function showNotif(msg) { setNotif(msg); }

  async function loadAll() {
    setLoading(true);
    try {
      const [clientsRes, jobsRes, notesRes, cleanersRes, propertiesRes] = await Promise.all([
        supabase.from('clients').select('*').order('name'),
        supabase.from('jobs').select('*, clients(id,name)').order('date'),
        supabase.from('notes').select('*, clients(id,name)').order('created_at', { ascending:false }),
        supabase.from('cleaners').select('*').order('name'),
        supabase.from('properties').select('*').order('created_at'),
      ]);
      if (clientsRes.error) throw clientsRes.error;
      if (jobsRes.error) throw jobsRes.error;
      if (notesRes.error) throw notesRes.error;
      if (cleanersRes.error) throw cleanersRes.error;
      if (propertiesRes.error) throw propertiesRes.error;

      setClients(clientsRes.data || []);
      setJobs((jobsRes.data || []).map(j => ({ ...j, client: j.clients?.name || "Unknown" })));
      setNotes((notesRes.data || []).map(n => ({ ...n, client: n.clients?.name || "Unknown" })));
      setCleaners(cleanersRes.data || []);
      setProperties(propertiesRes.data || []);
    } catch (err) {
      showNotif("⚠️ Failed to load data: " + err.message);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadAll(); }, []);

  async function handleAddSelfCleaner(name) {
    try {
      const { data, error } = await supabase.from('cleaners').insert({ name, active: true }).select().single();
      if (error) throw error;
      setCleaners(p => [...p, data].sort((a,b) => a.name.localeCompare(b.name)));
      const u = { id: data.id, name: data.name };
      localStorage.setItem(USER_KEY, JSON.stringify(u));
      setCurrentUser(u);
    } catch (err) {
      showNotif("⚠️ " + err.message);
    }
  }

  if (!trusted) {
    return (
      <>
        {notif && <div className="notif">{notif}</div>}
        <PassphraseGate onUnlock={() => { localStorage.setItem(TRUST_KEY, 'true'); setTrusted(true); }} />
      </>
    );
  }
  if (!currentUser) {
    return (
      <>

        <UserPicker cleaners={cleaners} loading={loading} onAddNew={handleAddSelfCleaner} onSelect={(c) => {

          setCurrentUser(u);
        }} />
      </>
    );

  const currentCleaner = cleaners.find(c => c.id === currentUser.id);

    if (!isOwner) { showNotif("⚠️ Only Janna can do that"); return false; }

  }

  const navItems = [
    { id:"dashboard", icon:"🏠", label:"Dashboard" },

    { id:"schedule",  icon:"📅", label:"Schedule" },
    { id:"clients",   icon:"👥", label:"Clients" },

  const pageTitles = {
    dashboard: "Good morning, Janna ☀️",

    schedule: "Schedule",
    clients: "Clients",
    notes: "Notes"
  };

  // ── STATS ──────────────────────────────────────────────────────
  const todayStr = new Date().toISOString().split('T')[0];
  const todayJobs = jobs.filter(j => j.date === todayStr && j.status !== "cancelled");
  const scheduledJobs = jobs.filter(j => j.status === "scheduled");
  const completedJobs = jobs.filter(j => j.status === "completed");
  const pendingJobs = jobs.filter(j => j.status === "pending");

  // ── FILTERED JOBS ─────────────────────────────────────────────
  const filteredJobs = jobs.filter(j => {
    const matchStatus = statusFilter === "all" || j.status === statusFilter;
    const q = searchQ.toLowerCase();
    const matchSearch = !q || (j.client||"").toLowerCase().includes(q) || (j.address||"").toLowerCase().includes(q) || (j.type||"").toLowerCase().includes(q);
    return matchStatus && matchSearch;
  });

  // ── SCHEDULE (group by date) ──────────────────────────────────
  const scheduleDays = {};
  [...jobs].filter(j => j.status !== "cancelled").sort((a,b) => a.date.localeCompare(b.date)).forEach(j => {
    if (!scheduleDays[j.date]) scheduleDays[j.date] = [];
    scheduleDays[j.date].push(j);

  const calendarCells = buildCalendarCells(calendarMonth);

  async function resolveClientId(form) {
    if (form.client_id === NEW_CLIENT_VALUE) {
      if (!form.newClientName.trim()) throw new Error("New client name is required");
      const { data, error } = await supabase.from('clients').insert({
        name: form.newClientName.trim(),
        phone: form.newClientPhone || null,
        email: form.newClientEmail || null,
        address: form.newClientAddress || null,
      }).select().single();
      if (error) throw error;
      setClients(p => [...p, data].sort((a,b) => a.name.localeCompare(b.name)));

      if (form.newClientAddress && form.newClientAddress.trim()) {
        try {
          const { data: prop, error: propErr } = await supabase.from('properties').insert({
            client_id: data.id, label: null, address: form.newClientAddress.trim(),
          }).select().single();
          if (propErr) throw propErr;
          setProperties(p => [...p, prop]);
        } catch (propErr) {
          // Non-fatal: the client's own `address` column already has this
          // text; failing to also seed a `properties` row shouldn't block
          // booking the job/note that triggered client creation.
          console.warn("Failed to auto-seed property:", propErr.message);
        }
      }

      return data.id;
    }
    if (!form.client_id) throw new Error("Client is required");
    return form.client_id;
  }

  function resetClientForm() { setClientForm(EMPTY_CLIENT_FORM); }

        address: clientForm.address || null,

      if (error) throw error;

                    <option value="inactive">Inactive</option>
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Role</label>
                  <select className="form-select" value={editCleaner.role || "cleaner"} onChange={e=>setEditCleaner(p=>({...p,role:e.target.value}))}>
                    <option value="cleaner">Cleaner</option>
                    <option value="owner">Owner</option>
                  </select>
                </div>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-danger" onClick={()=>handleDeleteCleaner(editCleaner.id)}>🗑 Delete</button>
              <button className="btn btn-ghost" onClick={()=>setEditCleaner(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleEditCleanerSave}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* ADD CLIENT MODAL */}
      {showClientModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowClientModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Add Client</div>
              <button className="modal-close" onClick={()=>setShowClientModal(false)}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Name *</label>
                <input className="form-input" value={clientForm.name} onChange={e=>setClientForm(p=>({...p,name:e.target.value}))} placeholder="Full name" />
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Phone</label>
                  <input className="form-input" value={clientForm.phone} onChange={e=>setClientForm(p=>({...p,phone:e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Email</label>
                  <input className="form-input" value={clientForm.email} onChange={e=>setClientForm(p=>({...p,email:e.target.value}))} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Address</label>
                <input className="form-input" value={clientForm.address} onChange={e=>setClientForm(p=>({...p,address:e.target.value}))} placeholder="Billing / primary address" />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setShowClientModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleAddClient}>Add Client</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT CLIENT MODAL */}
      {editClient && (
        <div className="modal-overlay" onClick={e=>{ if (e.target===e.currentTarget) { setEditClient(null); resetNewPropertyForm(); } }}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Edit Client</div>
              <button className="modal-close" onClick={()=>{ setEditClient(null); resetNewPropertyForm(); }}>×</button>
            </div>
            <div className="modal-body">
              <div className="form-group">
                <label className="form-label">Name *</label>
                <input className="form-input" value={editClient.name} onChange={e=>setEditClient(p=>({...p,name:e.target.value}))} />
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Phone</label>
                  <input className="form-input" value={editClient.phone||""} onChange={e=>setEditClient(p=>({...p,phone:e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Email</label>
                  <input className="form-input" value={editClient.email||""} onChange={e=>setEditClient(p=>({...p,email:e.target.value}))} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Address</label>
                <input className="form-input" value={editClient.address||""} onChange={e=>setEditClient(p=>({...p,address:e.target.value}))} />
              </div>
              <div className="form-group">
                <label className="form-label">Saved Properties</label>
                {propertiesForEditClient.length === 0 && (
                  <div style={{fontSize:12,color:"var(--slate-mid)",marginBottom:8}}>No saved properties yet</div>
                )}
                {propertiesForEditClient.map(p => (
                  <div key={p.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #f0f4f6"}}>
                    <div>
                      {p.label && <div style={{fontWeight:600,fontSize:13}}>{p.label}</div>}
                      <div style={{fontSize:12,color:"var(--slate-mid)"}}>{p.address}</div>
                    </div>
                    <button className="btn-icon danger" title="Delete property" onClick={()=>handleDeleteProperty(p.id)}>🗑</button>
                  </div>
                ))}
                <div className="form-row" style={{marginTop:8}}>
                  <input className="form-input" placeholder="Label (optional, e.g. Unit 4B)"
                    value={newPropertyForm.label} onChange={e=>setNewPropertyForm(p=>({...p, label:e.target.value}))} />
                  <input className="form-input" placeholder="Address"
                    value={newPropertyForm.address} onChange={e=>setNewPropertyForm(p=>({...p, address:e.target.value}))} />
                </div>
                <button className="btn btn-ghost" style={{marginTop:8}} onClick={handleAddProperty}>+ Add Property</button>
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>{ setEditClient(null); resetNewPropertyForm(); }}>Cancel</button>
              <button className="btn btn-primary" onClick={handleEditClientSave}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      <div className="app">
        {/* TOP HEADER */}
        <div className="topbar">
          <div className="topbar-left">
            <span className="brand-icon">🧹</span>
            <div>
              <div className="brand-name">Janna's Cleaning Service</div>
            </div>
          </div>
          <div className="topbar-right">
            {topbarActions[activeNav]}
            <div className="user-menu-wrap">
              <div className="avatar" style={{cursor:"pointer", background: currentUser ? colorFor(currentUser.id) : "var(--ocean)"}}
                onClick={()=>setShowUserMenu(v=>!v)}>
                {currentUser?.name?.[0] || "?"}
              </div>
              {showUserMenu && (
                <div className="user-menu" onMouseLeave={()=>setShowUserMenu(false)}>
                  <div className="user-menu-header">{currentUser?.name}</div>
                  <div className="user-menu-item" onClick={()=>{ localStorage.removeItem(USER_KEY); setCurrentUser(null); setShowUserMenu(false); }}>Switch user</div>
                  <div className="user-menu-item" onClick={()=>{ localStorage.removeItem(USER_KEY); localStorage.removeItem(TRUST_KEY); setCurrentUser(null); setTrusted(false); setShowUserMenu(false); }}>Lock device</div>
                </div>
              )}
            </div>
          </div>
        </div>

        {/* NAV BAR */}
        <div className="navbar">
          <div className="nav-tabs">
            {navItems.map(n => (
              <div key={n.id} className={`nav-item ${activeNav===n.id?"active":""}`} onClick={()=>setActiveNav(n.id)}>
                <span className="nav-icon">{n.icon}</span>
                <span>{n.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* MAIN */}
        <div className="main">
          <div className="content">
            {loading
              ? <div className="empty"><div className="empty-icon">⏳</div><div className="empty-text">Loading…</div></div>
              : pages[activeNav]?.()
            }
          </div>
          <div className="app-footer">r{APP_REV}</div>
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<JannasDashboard />);
</script>
</body>
</html>
