const SERVICE_TYPES = ["Standard Clean","Deep Clean","Move-In Clean","Move-Out Clean","Post-Construction","Window Cleaning"];
const RECURRENCE = ["One-time","Weekly","Bi-weekly","Monthly"];
const CLEANERS = ["Maria G.","Diane R.","Unassigned"];
const STATUS_TABS = ["all","scheduled","pending","completed","cancelled"];
const NEW_CLIENT_VALUE = "__new__";
const PALETTE = ["#4FA8C9","#6BAF8A","#E07B5A","#9B7BC4","#E8A838","#5BA5A5"];
const dotColor = { scheduled:"#2E7D9E", completed:"#2E7A4F", pending:"#B07A20", cancelled:"#C0442A" };

const EMPTY_BOOK_FORM = {
  client_id:"", newClientName:"", newClientPhone:"", newClientEmail:"", newClientAddress:"",
  address:"", type:"Standard Clean", recurring:"One-time",
  date:"", time:"", cleaner:"Unassigned", notes:"", status:"scheduled"
};
const EMPTY_NOTE_FORM = {
  client_id:"", newClientName:"", newClientPhone:"", newClientEmail:"", newClientAddress:"", text:""
};

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T12:00:00");
  return dt.toLocaleDateString("en-US", { month:"short", day:"numeric" });
}

function colorFor(id) {
  if (!id) return PALETTE[0];
  let hash = 0;
  for (let i = 0; i < id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(hash) % PALETTE.length];
}

// Reusable client picker: select an existing client, or add a brand-new one
// inline (no dedicated client-creation screen in v1).
function ClientPicker({ clients, form, setForm, label }) {
  const isNew = form.client_id === NEW_CLIENT_VALUE;
  return (
    <>
      <div className="form-group">
        <label className="form-label">{label || "Client"} *</label>
        <select className="form-select" value={form.client_id}
          onChange={e=>setForm(p=>({...p, client_id:e.target.value}))}>
          <option value="">Select a client…</option>
          {clients.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
          <option value={NEW_CLIENT_VALUE}>+ New client…</option>
        </select>
      </div>
      {isNew && (
        <>
          <div className="form-group">
            <label className="form-label">New Client Name *</label>
            <input className="form-input" value={form.newClientName}
              onChange={e=>setForm(p=>({...p, newClientName:e.target.value}))} placeholder="Full name" />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Phone</label>
              <input className="form-input" value={form.newClientPhone}
                onChange={e=>setForm(p=>({...p, newClientPhone:e.target.value}))} />
            </div>
            <div className="form-group">
              <label className="form-label">Email</label>
              <input className="form-input" value={form.newClientEmail}
                onChange={e=>setForm(p=>({...p, newClientEmail:e.target.value}))} />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Client Address</label>
            <input className="form-input" value={form.newClientAddress}
              onChange={e=>setForm(p=>({...p, newClientAddress:e.target.value}))} placeholder="Billing / primary address" />
          </div>
        </>
      )}

  );
}

function JannasDashboard() {
  const [activeNav, setActiveNav] = useState("dashboard");

  const [loading, setLoading] = useState(true);
  const [clients, setClients] = useState([]);
  const [jobs, setJobs] = useState([]);
  const [notes, setNotes] = useState([]);
  const [notif, setNotif] = useState(null);
  const [statusFilter, setStatusFilter] = useState("all");
  const [searchQ, setSearchQ] = useState("");
  const [showBookModal, setShowBookModal] = useState(false);
  const [showNoteModal, setShowNoteModal] = useState(false);
  const [editJob, setEditJob] = useState(null);

  const [bookForm, setBookForm] = useState(EMPTY_BOOK_FORM);
  const [noteForm, setNoteForm] = useState(EMPTY_NOTE_FORM);

  useEffect(() => {
    if (notif) { const t = setTimeout(() => setNotif(null), 3000); return () => clearTimeout(t); }
  }, [notif]);

  function showNotif(msg) { setNotif(msg); }

  async function loadAll() {
    setLoading(true);
    try {
      const [clientsRes, jobsRes, notesRes] = await Promise.all([
        supabase.from('clients').select('*').order('name'),
        supabase.from('jobs').select('*, clients(id,name)').order('date'),
        supabase.from('notes').select('*, clients(id,name)').order('created_at', { ascending:false }),
      ]);
      if (clientsRes.error) throw clientsRes.error;
      if (jobsRes.error) throw jobsRes.error;
      if (notesRes.error) throw notesRes.error;

      setClients(clientsRes.data || []);
      setJobs((jobsRes.data || []).map(j => ({ ...j, client: j.clients?.name || "Unknown" })));
      setNotes((notesRes.data || []).map(n => ({ ...n, client: n.clients?.name || "Unknown" })));
    } catch (err) {
      showNotif("⚠️ Failed to load data: " + err.message);
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadAll(); }, []);

  const navItems = [
    { id:"dashboard", icon:"🏠", label:"Dashboard" },
    { id:"jobs",      icon:"📋", label:"Jobs" },
    { id:"schedule",  icon:"📅", label:"Schedule" },
    { id:"clients",   icon:"👥", label:"Clients" },
    { id:"notes",     icon:"📝", label:"Notes" },
  ];

  const pageTitles = {
    dashboard: "Good morning, Janna ☀️",
    jobs: "Jobs",
    schedule: "Schedule",
    clients: "Clients",
    notes: "Notes"
  };

  // ── STATS ──────────────────────────────────────────────────────
  const todayStr = new Date().toISOString().split('T')[0];
  const todayJobs = jobs.filter(j => j.date === todayStr && j.status !== "cancelled");
  const scheduledJobs = jobs.filter(j => j.status === "scheduled");
  const completedJobs = jobs.filter(j => j.status === "completed");
  const pendingJobs = jobs.filter(j => j.status === "pending");

  // ── FILTERED JOBS ─────────────────────────────────────────────
  const filteredJobs = jobs.filter(j => {
    const matchStatus = statusFilter === "all" || j.status === statusFilter;
    const q = searchQ.toLowerCase();
    const matchSearch = !q || (j.client||"").toLowerCase().includes(q) || (j.address||"").toLowerCase().includes(q) || (j.type||"").toLowerCase().includes(q);
    return matchStatus && matchSearch;
  });

  // ── SCHEDULE (group by date) ──────────────────────────────────
  const scheduleDays = {};
  [...jobs].filter(j => j.status !== "cancelled").sort((a,b) => a.date.localeCompare(b.date)).forEach(j => {
    if (!scheduleDays[j.date]) scheduleDays[j.date] = [];
    scheduleDays[j.date].push(j);
  });

  function resetBookForm() { setBookForm(EMPTY_BOOK_FORM); }
  function resetNoteForm() { setNoteForm(EMPTY_NOTE_FORM); }

  async function resolveClientId(form) {
    if (form.client_id === NEW_CLIENT_VALUE) {
      if (!form.newClientName.trim()) throw new Error("New client name is required");
      const { data, error } = await supabase.from('clients').insert({
        name: form.newClientName.trim(),
        phone: form.newClientPhone || null,
        email: form.newClientEmail || null,
        address: form.newClientAddress || null,
      }).select().single();
      if (error) throw error;
      setClients(p => [...p, data].sort((a,b) => a.name.localeCompare(b.name)));
      return data.id;
    }
    if (!form.client_id) throw new Error("Client is required");
    return form.client_id;
  }

  // ── BOOK JOB ──────────────────────────────────────────────────
  async function handleBook() {
    if (!bookForm.date) { showNotif("⚠️ Client and date are required"); return; }
    try {
      const clientId = await resolveClientId(bookForm);
      const { data, error } = await supabase.from('jobs').insert({
        client_id: clientId,
        address: bookForm.address,
        type: bookForm.type,
        recurring: bookForm.recurring,
        status: bookForm.status,
        date: bookForm.date,
        time: bookForm.time,
        cleaner: bookForm.cleaner,
        notes: bookForm.notes,
      }).select('*, clients(id,name)').single();
      if (error) throw error;

      setJobs(p => [...p, { ...data, client: data.clients?.name || "Unknown" }]);
      setShowBookModal(false);
      resetBookForm();
      showNotif("✓ Job booked successfully");
    } catch (err) {
      showNotif("⚠️ " + err.message);
    }
  }

  // ── EDIT JOB ──────────────────────────────────────────────────
  async function handleEditSave() {
    if (!editJob.date) { showNotif("⚠️ Client and date are required"); return; }
    try {
      const clientId = await resolveClientId(editJob);
      const { data, error } = await supabase.from('jobs').update({
        client_id: clientId,
        address: editJob.address,
        type: editJob.type,
        recurring: editJob.recurring,
        status: editJob.status,
        date: editJob.date,
        time: editJob.time,
        cleaner: editJob.cleaner,
        notes: editJob.notes,
      }).eq('id', editJob.id).select('*, clients(id,name)').single();
      if (error) throw error;

      setJobs(p => p.map(j => j.id === editJob.id ? { ...data, client: data.clients?.name || "Unknown" } : j));
      setEditJob(null);
      showNotif("✓ Job updated");
    } catch (err) {
      showNotif("⚠️ " + err.message);
    }
  }

  async function handleDeleteJob(id) {
    try {
      const { error } = await supabase.from('jobs').delete().eq('id', id);
      if (error) throw error;
      setJobs(p => p.filter(j => j.id !== id));
      setEditJob(null);
      showNotif("🗑 Job removed");
    } catch (err) {
      showNotif("⚠️ " + err.message);
    }
  }

  async function handleMarkComplete(id) {
    try {
      const { error } = await supabase.from('jobs').update({ status: "completed" }).eq('id', id);
      if (error) throw error;
      setJobs(p => p.map(x => x.id===id ? {...x,status:"completed"} : x));
      showNotif("✓ Job marked complete");
    } catch (err) {
      showNotif("⚠️ " + err.message);
    }
  }

  // ── ADD NOTE ─────────────────────────────────────────────────
  async function handleAddNote() {
    if (!noteForm.text.trim()) { showNotif("⚠️ Client and note text required"); return; }
    try {
      const clientId = await resolveClientId(noteForm);
      const { data, error } = await supabase.from('notes').insert({
        client_id: clientId,
        text: noteForm.text,
        date: new Date().toISOString().split('T')[0],
      }).select('*, clients(id,name)').single();
      if (error) throw error;

      setNotes(p => [{ ...data, client: data.clients?.name || "Unknown" }, ...p]);
      setShowNoteModal(false);
      resetNoteForm();
      showNotif("✓ Note added");
    } catch (err) {
      showNotif("⚠️ " + err.message);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // RENDER PAGES
  // ═══════════════════════════════════════════════════════════════

  const renderDashboard = () => (
    <>
      <div className="stats-grid">
        {[
          { label:"Today's Jobs", value: todayJobs.length, sub:"Scheduled today", accent:"#E8F4F8" },
          { label:"Scheduled", value: scheduledJobs.length, sub:"Upcoming", accent:"#E8F4F8" },
          { label:"Pending", value: pendingJobs.length, sub:"Need confirmation", accent:"#FFF8EC" },
          { label:"Completed", value: completedJobs.length, sub:"All time", accent:"#E8F5EE" },
        ].map((s,i) => (
          <div key={i} className="stat-card" style={{"--accent":s.accent}}>
            <div className="stat-label">{s.label}</div>
            <div className="stat-value">{s.value}</div>
            <div className="stat-sub">{s.sub}</div>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-header">
          <div className="card-title">Today's Schedule</div>
          <span style={{fontSize:12,color:"var(--slate-mid)"}}>
            {new Date(todayStr+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}
          </span>
        </div>
        <div className="card-body">
          {todayJobs.length === 0
            ? <div className="empty"><div className="empty-icon">☀️</div><div className="empty-text">No jobs scheduled today</div></div>
            : todayJobs.map(j => (
                <div key={j.id} className="job-row">
                  <div className="job-info">
                    <div className="job-top">
                      <span className="job-client">{j.client}</span>
                      <span className={`badge badge-${j.status}`}><span className="badge-dot"></span>{j.status}</span>
                    </div>
                    <div className="job-meta">{j.address}</div>
                    <div className="job-details">
                      <span className="job-time">{j.time}</span>
                      <span className="job-type">{j.type} · {j.cleaner}</span>
                    </div>
                  </div>
                  <div className="job-actions">
                    {j.status !== "completed" &&
                      <button className="btn-icon" title="Mark complete" onClick={() => handleMarkComplete(j.id)}>
                        ✓
                      </button>
                    }
                  </div>
                </div>
              ))
          }
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div className="card-title">Recent Activity</div>
        </div>
        <div className="card-body">
          {[...jobs].reverse().slice(0,4).map(j => (
            <div key={j.id} className="job-row">
              <div style={{width:8,height:8,borderRadius:"50%",background:dotColor[j.status]||"#A8BECB",flexShrink:0,marginTop:6}}></div>
              <div className="job-info">
                <div className="job-top">
                  <span className="job-client">{j.client}</span>
                  <span className={`badge badge-${j.status}`}><span className="badge-dot"></span>{j.status}</span>
                </div>
                <div className="job-details">
                  <span className="job-time">{fmtDate(j.date)}</span>
                  <span className="job-type">{j.type}</span>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );

  const renderJobs = () => (
    <div className="card">
      <div className="search-bar">
        <input className="search-input" placeholder="Search clients, address, type…" value={searchQ} onChange={e=>setSearchQ(e.target.value)} />
      </div>
      <div className="filter-tabs">
        {STATUS_TABS.map(t => (
          <button key={t} className={`filter-tab ${statusFilter===t?"active":""}`} onClick={()=>setStatusFilter(t)}>
            {t.charAt(0).toUpperCase()+t.slice(1)}
          </button>
        ))}
      </div>
      <div className="card-body">
        {filteredJobs.length === 0
          ? <div className="empty"><div className="empty-icon">📋</div><div className="empty-text">No jobs found</div></div>
          : filteredJobs.map(j => (
              <div key={j.id} className="job-row">
                <div className="job-info">
                  <div className="job-top">
                    <span className="job-client">{j.client}</span>
                    <span className={`badge badge-${j.status}`}><span className="badge-dot"></span>{j.status}</span>
                    {j.recurring !== "One-time" && <span className="badge badge-recurring">{j.recurring}</span>}
                  </div>
                  <div className="job-meta">{j.address}</div>
                  <div className="job-details">
                    <span className="job-time">{j.time} · {fmtDate(j.date)}</span>
                    <span className="job-type">{j.type} · {j.cleaner}</span>
                  </div>
                </div>
                <div className="job-actions">
                  {j.status !== "completed" &&
                    <button className="btn-icon" title="Mark complete" onClick={() => handleMarkComplete(j.id)}>
                      ✓
                    </button>
                  }
                  <button className="btn-icon" title="Edit job" onClick={()=>setEditJob({
                    ...j, client_id: j.client_id, newClientName:"", newClientPhone:"", newClientEmail:"", newClientAddress:""
                  })}>✏️</button>
                </div>
              </div>
            ))
        }
      </div>
    </div>
  );

  const renderSchedule = () => (
    <>
      {Object.keys(scheduleDays).length === 0
        ? <div className="empty"><div className="empty-icon">📅</div><div className="empty-text">No scheduled jobs</div></div>
        : Object.entries(scheduleDays).map(([date, dayJobs]) => (
            <div key={date} className="schedule-day">
              <div className="day-header">
                <div className="day-label">
                  {new Date(date+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"})}
                </div>
                <div className="day-line"></div>
                <div className="day-count">{dayJobs.length} job{dayJobs.length!==1?"s":""}</div>
              </div>
              {dayJobs.map(j => (
                <div key={j.id} className="slot">
                  <div className="slot-dot" style={{background: dotColor[j.status] || "#A8BECB"}}></div>
                  <div className="slot-time">{j.time || "—"}</div>
                  <div className="slot-info">
                    <div className="slot-client">{j.client}</div>
                    <div className="slot-detail">{j.type} · {j.cleaner} · {j.address}</div>
                  </div>
                  <span className={`badge badge-${j.status}`}><span className="badge-dot"></span>{j.status}</span>
                </div>
              ))}
            </div>
          ))
      }
    </>
  );

  const renderClients = () => (
    <div className="card">
      <div className="card-header">
        <div className="card-title">All Clients</div>
        <span style={{fontSize:12,color:"var(--slate-mid)"}}>{clients.length} total</span>
      </div>
      <div className="card-body">
        {clients.length === 0
          ? <div className="empty"><div className="empty-icon">👥</div><div className="empty-text">No clients yet</div></div>
          : clients.map(c => {
              const clientJobs = jobs.filter(j => j.client_id === c.id).sort((a,b)=>a.date.localeCompare(b.date));
              const lastJob = clientJobs[clientJobs.length-1];
              return (
                <div key={c.id} className="client-row">
                  <div className="client-avatar" style={{background:colorFor(c.id)}}>{c.name[0]}</div>
                  <div style={{flex:1}}>
                    <div className="client-name">{c.name}</div>
                    <div className="client-addr">{c.address || "No address on file"}</div>
                  </div>
                  <div style={{textAlign:"right", marginRight:10}}>
                    <div style={{fontSize:12,fontWeight:600,color:"var(--ocean)"}}>{lastJob?.recurring || "—"}</div>
                    <div style={{fontSize:11,color:"var(--slate-mid)"}}>{clientJobs.length} job{clientJobs.length!==1?"s":""}</div>
                  </div>
                  {lastJob && (
                    <span className={`badge badge-${lastJob.status}`}>
                      <span className="badge-dot"></span>{lastJob.status}
                    </span>
                  )}
                </div>
              );
            })
        }
      </div>
    </div>
  );

  const renderNotes = () => (
    <div className="card">
      <div className="card-header">
        <div className="card-title">Cleaner Notes</div>
      </div>
      <div className="card-body" style={{padding:16}}>
        {notes.length === 0
          ? <div className="empty"><div className="empty-icon">📝</div><div className="empty-text">No notes yet</div></div>
          : <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
              {notes.map(n => (
                <div key={n.id} className="note-item" style={{borderLeftColor:colorFor(n.client_id),padding:"14px 16px"}}>
                  <div className="note-header">
                    <span className="note-client">{n.client}</span>
                    <span className="note-date">{fmtDate(n.date)}</span>
                  </div>
                  <div className="note-text">{n.text}</div>
                </div>
              ))}
            </div>
        }
      </div>
    </div>
  );

  const topbarActions = {
    dashboard: <button className="btn btn-primary" onClick={()=>setShowBookModal(true)}>+ Book Job</button>,
    jobs:      <button className="btn btn-primary" onClick={()=>setShowBookModal(true)}>+ Book Job</button>,
    schedule:  <button className="btn btn-primary" onClick={()=>setShowBookModal(true)}>+ Book Job</button>,
    clients:   null,
    notes:     <button className="btn btn-primary" onClick={()=>setShowNoteModal(true)}>+ Add Note</button>,
  };

  const pages = { dashboard: renderDashboard, jobs: renderJobs, schedule: renderSchedule, clients: renderClients, notes: renderNotes };

  return (
    <>
      <style>{styles}</style>
      {notif && <div className="notif">{notif}</div>}

      {/* BOOK MODAL */}
      {showBookModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowBookModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Book a Job</div>
              <button className="modal-close" onClick={()=>setShowBookModal(false)}>×</button>
            </div>
            <div className="modal-body">
              <ClientPicker clients={clients} form={bookForm} setForm={setBookForm} label="Client" />
              <div className="form-group">
                <label className="form-label">Status</label>
                <select className="form-select" value={bookForm.status} onChange={e=>setBookForm(p=>({...p,status:e.target.value}))}>
                  {["scheduled","pending","cancelled"].map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Job Site Address</label>
                <input className="form-input" value={bookForm.address} onChange={e=>setBookForm(p=>({...p,address:e.target.value}))} placeholder="Street address" />
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Service Type</label>
                  <select className="form-select" value={bookForm.type} onChange={e=>setBookForm(p=>({...p,type:e.target.value}))}>
                    {SERVICE_TYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Recurrence</label>
                  <select className="form-select" value={bookForm.recurring} onChange={e=>setBookForm(p=>({...p,recurring:e.target.value}))}>
                    {RECURRENCE.map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Date *</label>
                  <input className="form-input" type="date" value={bookForm.date} onChange={e=>setBookForm(p=>({...p,date:e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Time</label>
                  <input className="form-input" type="time" value={bookForm.time} onChange={e=>setBookForm(p=>({...p,time:e.target.value}))} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Assign Cleaner</label>
                <select className="form-select" value={bookForm.cleaner} onChange={e=>setBookForm(p=>({...p,cleaner:e.target.value}))}>
                  {CLEANERS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Notes for Cleaner</label>
                <textarea className="form-textarea" value={bookForm.notes} onChange={e=>setBookForm(p=>({...p,notes:e.target.value}))} placeholder="Access instructions, special requests…" />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setShowBookModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleBook}>Book Job</button>
            </div>
          </div>
        </div>
      )}

      {/* EDIT MODAL */}
      {editJob && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditJob(null)}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Edit Job</div>
              <button className="modal-close" onClick={()=>setEditJob(null)}>×</button>
            </div>
            <div className="modal-body">
              <ClientPicker clients={clients} form={editJob} setForm={setEditJob} label="Client" />
              <div className="form-group">
                <label className="form-label">Status</label>
                <select className="form-select" value={editJob.status} onChange={e=>setEditJob(p=>({...p,status:e.target.value}))}>
                  {["scheduled","pending","completed","cancelled"].map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Job Site Address</label>
                <input className="form-input" value={editJob.address} onChange={e=>setEditJob(p=>({...p,address:e.target.value}))} />
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Service Type</label>
                  <select className="form-select" value={editJob.type} onChange={e=>setEditJob(p=>({...p,type:e.target.value}))}>
                    {SERVICE_TYPES.map(t=><option key={t}>{t}</option>)}
                  </select>
                </div>
                <div className="form-group">
                  <label className="form-label">Recurrence</label>
                  <select className="form-select" value={editJob.recurring} onChange={e=>setEditJob(p=>({...p,recurring:e.target.value}))}>
                    {RECURRENCE.map(r=><option key={r}>{r}</option>)}
                  </select>
                </div>
              </div>
              <div className="form-row">
                <div className="form-group">
                  <label className="form-label">Date *</label>
                  <input className="form-input" type="date" value={editJob.date} onChange={e=>setEditJob(p=>({...p,date:e.target.value}))} />
                </div>
                <div className="form-group">
                  <label className="form-label">Time</label>
                  <input className="form-input" type="time" value={editJob.time} onChange={e=>setEditJob(p=>({...p,time:e.target.value}))} />
                </div>
              </div>
              <div className="form-group">
                <label className="form-label">Assign Cleaner</label>
                <select className="form-select" value={editJob.cleaner} onChange={e=>setEditJob(p=>({...p,cleaner:e.target.value}))}>
                  {CLEANERS.map(c=><option key={c}>{c}</option>)}
                </select>
              </div>
              <div className="form-group">
                <label className="form-label">Notes for Cleaner</label>
                <textarea className="form-textarea" value={editJob.notes} onChange={e=>setEditJob(p=>({...p,notes:e.target.value}))} />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost btn-icon danger" style={{width:"auto",padding:"8px 14px",fontSize:13}} onClick={()=>handleDeleteJob(editJob.id)}>🗑 Delete</button>
              <button className="btn btn-ghost" onClick={()=>setEditJob(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleEditSave}>Save Changes</button>
            </div>
          </div>
        </div>
      )}

      {/* NOTE MODAL */}
      {showNoteModal && (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowNoteModal(false)}>
          <div className="modal">
            <div className="modal-header">
              <div className="modal-title">Add Note</div>
              <button className="modal-close" onClick={()=>setShowNoteModal(false)}>×</button>
            </div>
            <div className="modal-body">
              <ClientPicker clients={clients} form={noteForm} setForm={setNoteForm} label="Client" />
              <div className="form-group">
                <label className="form-label">Note</label>
                <textarea className="form-textarea" value={noteForm.text} onChange={e=>setNoteForm(p=>({...p,text:e.target.value}))} placeholder="Instructions, access codes, preferences…" style={{minHeight:120}} />
              </div>
            </div>
            <div className="modal-footer">
              <button className="btn btn-ghost" onClick={()=>setShowNoteModal(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={handleAddNote}>Add Note</button>
            </div>
          </div>
        </div>
      )}

      <div className="app">
        {/* TOP HEADER */}
        <div className="topbar">
          <div className="topbar-left">
            <span className="brand-icon">🧹</span>
            <div>
              <div className="brand-name">Janna's Cleaning Service</div>
            </div>
          </div>
          <div className="topbar-right">
            {topbarActions[activeNav]}
            <div className="avatar">J</div>
          </div>
        </div>

        {/* NAV BAR */}
        <div className="navbar">
          <div className="nav-tabs">
            {navItems.map(n => (
              <div key={n.id} className={`nav-item ${activeNav===n.id?"active":""}`} onClick={()=>setActiveNav(n.id)}>
                <span className="nav-icon">{n.icon}</span>
                <span>{n.label}</span>
              </div>
            ))}
          </div>
        </div>

        {/* MAIN */}
        <div className="main">
          <div className="content">
            {loading
              ? <div className="empty"><div className="empty-icon">⏳</div><div className="empty-text">Loading…</div></div>
              : pages[activeNav]?.()
            }
          </div>
          <div className="app-footer">r{APP_REV}</div>
        </div>
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<JannasDashboard />);
</script>
</body>
</html>
